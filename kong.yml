_format_version: "3.0"

# 1. Define your backend services
services:
  - name: booking-service
    url: http://host.docker.internal:8081
    routes:
      - name: booking-route
        paths:
          - /api/v1/booking
        strip_path: false

  - name: inventory-service
    url: http://host.docker.internal:8080
    routes:
      - name: inventory-route
        paths:
          - /api/v1/inventory
        strip_path: false