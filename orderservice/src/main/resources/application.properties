spring.application.name=orderservice
server.port=8082
inventory.service.url=http://localhost:8080/api/v1/inventory
spring.datasource.url=jdbc:postgresql://localhost:5432/ticket
spring.datasource.username=postgres
spring.datasource.password=seng12
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true



# Kafka Configuration
# keep your existing bootstrap server
spring.kafka.bootstrap-servers=localhost:9092

# producer serializers
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# consumer deserializers
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.type.mapping=bookingEvent:com.example.bookingservice.event.BookingEvent
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.bookingservice,com.example.orderservice
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.group-id=order-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.max-poll-records=10
spring.kafka.consumer.enable-auto-commit=true
spring.kafka.listener.ack-mode=batch
spring.kafka.listener.poll-timeout=3000

# optional: cleaner payload headers
spring.kafka.properties.spring.json.add.type.headers=false

# keep topic naming consistent
spring.kafka.template.default-topic=order-service
spring.kafka.producer.retries=1
spring.kafka.producer.retry-backoff-ms=100
spring.kafka.producer.acks=1
spring.kafka.producer.request-timeout-ms=5000
spring.kafka.producer.delivery-timeout-ms=10000
spring.kafka.properties.connections.max.idle.ms=9000
spring.kafka.properties.reconnect.backoff.ms=100
spring.kafka.properties.reconnect.backoff.max.ms=1000